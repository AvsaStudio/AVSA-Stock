version: "3.8"

# Bloomberg Financial Dashboard - Infrastructure Stack
# Includes: Kafka, Zookeeper, Redis, Cassandra, MinIO (S3), Airflow

services:

  # ── Kafka / Zookeeper ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bloomberg-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bloomberg-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bloomberg-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bloomberg
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: bloomberg-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bloomberg-redis-ui
    depends_on:
      - redis
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379

  # ── Cassandra ─────────────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: bloomberg-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: bloomberg-cluster
      CASSANDRA_DC: datacenter1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible) ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: bloomberg-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: bloomberg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/financial-dashboard --ignore-existing;
        mc mb local/financial-dashboard/raw-data --ignore-existing;
        mc mb local/financial-dashboard/daily-reports --ignore-existing;
        mc mb local/financial-dashboard/logs --ignore-existing;
        echo 'MinIO buckets ready';
      "

  # ── Airflow ───────────────────────────────────────────────────────────────
  airflow-db:
    image: postgres:15-alpine
    container_name: bloomberg-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.8.0
    container_name: bloomberg-airflow
    depends_on:
      - airflow-db
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: "zTMJFNabcXJMp1A3m6Vfz4Eox-c5Ek87k5_i7fwcWU="
      AIRFLOW__WEBSERVER__SECRET_KEY: "bloomberg-secret"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      CASSANDRA_CONTACT_POINTS: cassandra
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: financial-dashboard
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin \
          --firstname Bloomberg --lastname Admin \
          --role Admin --email admin@bloomberg.local &&
        airflow scheduler &
        airflow webserver
      "

volumes:
  zk-data:
  zk-logs:
  kafka-data:
  redis-data:
  cassandra-data:
  minio-data:
  airflow-db-data:
  airflow-logs:
